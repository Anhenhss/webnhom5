<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm | WebNhom5</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-categories.css">
    <link rel="stylesheet" href="css/admin-products.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-logo"><img src="image/logo.png" alt="WebNhom5"></div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> Tổng quan</a>
                <a href="admin-orders.html" class="nav-item"><i class="ph ph-receipt"></i> Đơn hàng</a>
                <a href="admin-products.html" class="nav-item active"><i class="ph-fill ph-package"></i> Sản phẩm</a>
                <a href="admin-categories.html" class="nav-item"><i class="ph ph-list-dashes"></i> Danh mục</a>
                <a href="admin-users.html" class="nav-item"><i class="ph ph-users"></i> Quản trị Hệ thống</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="nav-item back-to-store"><i class="ph ph-storefront"></i> Về cửa hàng</a>
            </div>
        </aside>

        <div class="admin-main">
            <header class="admin-topbar">
                <div class="topbar-search">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="product-search-input" placeholder="Tìm kiếm sản phẩm...">
                </div>
                <div class="topbar-profile">
                    <div class="profile-info">
                        <img src="" class="avatar" id="admin-avatar">
                        <span class="admin-name" id="display-admin-name">Thảo Nguyễn (PM)</span>
                    </div>
                    <button class="btn-logout" onclick="logout()"><i class="ph ph-sign-out"></i></button>
                </div>
            </header>

            <main class="dashboard-content">
                <div class="page-header-flex">
                    <h1 class="page-title">Danh sách Sản phẩm</h1>
                    <button class="btn btn-primary" onclick="openProductModal()">
                        <i class="ph ph-plus"></i> Thêm sản phẩm & Biến thể
                    </button>
                </div>

                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Ảnh</th>
                                <th>Sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá khoảng</th>
                                <th>Tổng kho</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="product-tbody">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="product-modal" style="display: none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Thông tin sản phẩm & SKU</h2>
                <button class="btn-close" onclick="closeModal()"><i class="ph ph-x"></i></button>
            </div>
            <form id="product-form">
                <div class="modal-body">
                    <div class="order-grid">
                        <div class="order-info-col">
                            <div class="info-card">
                                <h3><i class="ph ph-image"></i> Ảnh chính</h3>
                                <div class="image-preview-box" onclick="document.getElementById('product-file').click()">
                                    <img id="img-preview" src="" style="display:none;">
                                    <div id="upload-hint">
                                        <i class="ph ph-cloud-arrow-up"></i>
                                        <p>Tải ảnh lên</p>
                                    </div>
                                </div>
                                <input type="file" id="product-file" hidden accept="image/*" onchange="handlePreview(this)">
                            </div>
                            
                            <div class="info-card" style="margin-top: 15px;">
                                <div class="form-group">
                                    <label>Tên sản phẩm</label>
                                    <input type="text" id="prod-name" class="form-control" required>
                                </div>
                                <div class="form-group" style="margin-top: 10px;">
                                    <label>Danh mục</label>
                                    <select id="prod-cat" class="form-control" required></select>
                                </div>
                            </div>
                        </div>

                        <div class="order-items-col">
                            <div class="info-card">
                                <h3><i class="ph ph-git-branch"></i> Thiết lập biến thể</h3>
                                <div class="variant-config">
                                    <div class="attr-row">
                                        <label>Màu sắc (Enter để thêm)</label>
                                        <div id="color-tags" class="tag-input-box">
                                            <input type="text" onkeydown="addTag(event, 'color')" placeholder="...">
                                        </div>
                                    </div>
                                    <div class="attr-row" style="margin-top: 10px;">
                                        <label>Kích thước (Enter để thêm)</label>
                                        <div id="size-tags" class="tag-input-box">
                                            <input type="text" onkeydown="addTag(event, 'size')" placeholder="...">
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-outline btn-sm" onclick="generateSKUs()" style="margin-top: 10px; width: 100%;">
                                        <i class="ph ph-magic-wand"></i> Tạo danh sách SKU
                                    </button>
                                </div>
                            </div>

                            <div class="info-card" style="margin-top: 15px;">
                                <h3><i class="ph ph-list-numbers"></i> Danh sách SKU</h3>
                                <div class="sku-table-container">
                                    <table class="sku-table">
                                        <thead>
                                            <tr>
                                                <th>Phân loại</th>
                                                <th>Giá bán</th>
                                                <th>Kho</th>
                                                <th></th>
                                            </tr>
                                        </thead>
                                        <tbody id="sku-body"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu sản phẩm</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/api.js"></script>
    <script src="js/admin-products.js"></script>
</body>
</html>
